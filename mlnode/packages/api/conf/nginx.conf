daemon on;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    access_log /var/log/nginx/access.log;

    # ML Node API proxy with version strip
    server {
        listen 0.0.0.0:8081;

        # Strip version prefix like /v3.0.8/ from incoming requests
        location ~ ^/v[0-9]+\.[0-9]+(\.[0-9]+)?/(.*)$ {
            rewrite ^/v[0-9]+\.[0-9]+(\.[0-9]+)?/(.*)$ /$2 break;
            proxy_pass http://127.0.0.1:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_connect_timeout 24h;
            proxy_read_timeout 24h;
            proxy_send_timeout 24h;
        }

        # Default - proxy everything else as-is
        location / {
            proxy_pass http://127.0.0.1:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_connect_timeout 24h;
            proxy_read_timeout 24h;
            proxy_send_timeout 24h;
        }
    }

    # vLLM inference proxy with version strip
    server {
        listen 0.0.0.0:5002;

        # Health endpoint - matches /vX.X.X/health AND /vX.X.X/api/v1/health
        # Routes to MLNode API which has proper health checks
        location ~ ^/v[0-9]+\.[0-9]+(\.[0-9]+)?/(.*)?health$ {
            rewrite ^/v[0-9]+\.[0-9]+(\.[0-9]+)?/(.*)?health$ /health break;
            proxy_pass http://127.0.0.1:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 15s;
            proxy_send_timeout 15s;
        }

        # Strip version prefix like /v3.0.8/ from incoming requests
        location ~ ^/v[0-9]+\.[0-9]+(\.[0-9]+)?/(.*)$ {
            rewrite ^/v[0-9]+\.[0-9]+(\.[0-9]+)?/(.*)$ /$2 break;
            proxy_pass http://127.0.0.1:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_connect_timeout 24h;
            proxy_read_timeout 24h;
            proxy_send_timeout 24h;
        }

        # Default - proxy everything else as-is
        location / {
            proxy_pass http://127.0.0.1:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_connect_timeout 24h;
            proxy_read_timeout 24h;
            proxy_send_timeout 24h;
        }
    }
}
